<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="KBPrep 完整流程图白板版：从资料输入到规则字典迭代的完整可视化流程。">
  <title>KBPrep 完整流程图白板版</title>
  <style>
    :root {
      --ink: #20252b;
      --muted: #77818d;
      --line: #b9bfc6;
      --soft-line: #e6e8eb;
      --panel: rgba(255, 255, 255, .92);
      --accent: #111827;
      --warn: #9b3d35;
      --ok: #2f6f5f;
      --zoom: 1;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      color: var(--ink);
      background: #fafafa;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      letter-spacing: 0;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      z-index: 20;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 12px 18px;
      border-bottom: 1px solid var(--soft-line);
      background: rgba(255, 255, 255, .94);
      backdrop-filter: blur(12px);
    }

    .brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      color: var(--accent);
      font-size: clamp(18px, 2vw, 28px);
      line-height: 1.12;
    }

    .subtitle {
      margin-top: 3px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .tools {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search {
      width: 260px;
      height: 36px;
      padding: 0 12px;
      border: 1px solid #d5d8dc;
      border-radius: 999px;
      background: #fff;
      color: var(--ink);
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .tool-button {
      min-width: 36px;
      height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 12px;
      border: 1px solid #d5d8dc;
      border-radius: 999px;
      background: #fff;
      color: var(--accent);
      cursor: pointer;
      font-weight: 800;
    }

    .tool-button:hover {
      border-color: #9ba3ad;
      background: #f6f6f6;
    }

    .zoom-readout {
      min-width: 54px;
      color: var(--muted);
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .viewport {
      position: relative;
      overflow: auto;
      cursor: grab;
      background:
        radial-gradient(circle at 1px 1px, #e8eaed 1px, transparent 0) 0 0 / 28px 28px,
        #fff;
    }

    .viewport.dragging {
      cursor: grabbing;
    }

    .scale-shell {
      position: relative;
      width: 4460px;
      height: 4780px;
    }

    .canvas {
      position: relative;
      width: 4460px;
      height: 4780px;
      transform: scale(var(--zoom));
      transform-origin: top left;
    }

    .edge-layer {
      position: absolute;
      inset: 0;
      width: 4460px;
      height: 4780px;
      overflow: visible;
      pointer-events: none;
    }

    .edge {
      fill: none;
      stroke: var(--line);
      stroke-width: 1.35;
      opacity: .95;
    }

    .edge.loop {
      stroke: #a9aeb5;
      stroke-dasharray: 7 7;
    }

    .edge.pass {
      stroke: var(--ok);
    }

    .edge.fail {
      stroke: var(--warn);
    }

    .edge-label {
      position: absolute;
      z-index: 4;
      padding: 2px 7px;
      border: 1px solid #e0e2e5;
      border-radius: 999px;
      background: rgba(255, 255, 255, .94);
      color: #58616c;
      font-size: 12px;
      line-height: 1.25;
      white-space: nowrap;
      pointer-events: none;
    }

    .node {
      position: absolute;
      z-index: 5;
      width: 172px;
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 7px 10px;
      border: 1px solid #d8dbe0;
      border-radius: 2px;
      background: rgba(255, 255, 255, .98);
      color: #242a31;
      text-align: center;
      line-height: 1.28;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(18, 24, 30, .045);
    }

    .node.main {
      border-color: #c8ccd2;
      background: #fff;
      font-weight: 900;
      box-shadow: 0 4px 12px rgba(18, 24, 30, .06);
    }

    .node.long {
      width: 230px;
    }

    .node.wide {
      width: 292px;
    }

    .node.decision {
      width: 156px;
      height: 86px;
      padding: 16px 20px;
      border-color: #d9dce0;
      clip-path: polygon(50% 0, 100% 50%, 50% 100%, 0 50%);
      background: #fff;
      box-shadow: none;
    }

    .node.terminal {
      border-color: #e2d0cb;
      background: #fffafa;
      color: #47322e;
    }

    .node.highlight {
      border-color: #111827;
      outline: 5px solid rgba(250, 204, 21, .32);
      z-index: 8;
    }

    .node.dimmed {
      opacity: .24;
    }

    .stage-label {
      position: absolute;
      z-index: 3;
      padding: 5px 9px;
      border: 1px solid #e4e6e9;
      border-radius: 999px;
      background: rgba(255, 255, 255, .86);
      color: #6b7480;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
      pointer-events: none;
    }

    .help-card {
      position: absolute;
      right: 22px;
      bottom: 22px;
      z-index: 15;
      width: min(360px, calc(100% - 44px));
      padding: 14px 16px;
      border: 1px solid #dfe2e6;
      border-radius: 10px;
      background: rgba(255, 255, 255, .9);
      box-shadow: 0 12px 28px rgba(18, 24, 30, .08);
      color: #4b5561;
      font-size: 13px;
      line-height: 1.55;
    }

    .help-card strong {
      display: block;
      margin-bottom: 5px;
      color: #111827;
      font-size: 14px;
    }

    @media (max-width: 960px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .tools {
        justify-content: flex-start;
      }

      .search {
        width: min(100%, 300px);
      }

      .help-card {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">KB</div>
        <div>
          <h1>KBPrep 完整流程图</h1>
          <div class="subtitle">白板式全链路：先转换、验转换、再分块清洗、逐块验收、合并发布、反馈进规则库</div>
        </div>
      </div>
      <div class="tools" aria-label="流程图控制">
        <input class="search" id="searchBox" type="search" placeholder="搜索节点：转换质量、分块、规则">
        <button class="tool-button" id="prevMatch" type="button" title="上一个匹配">↑</button>
        <button class="tool-button" id="nextMatch" type="button" title="下一个匹配">↓</button>
        <button class="tool-button" id="zoomOut" type="button" title="缩小">−</button>
        <span class="zoom-readout" id="zoomReadout">100%</span>
        <button class="tool-button" id="zoomIn" type="button" title="放大">＋</button>
        <button class="tool-button" id="fitAll" type="button">全图</button>
        <button class="tool-button" id="fitWidth" type="button">适宽</button>
        <button class="tool-button" id="readMode" type="button">阅读</button>
        <button class="tool-button" id="fullScreen" type="button">全屏</button>
      </div>
    </header>

    <main class="viewport" id="viewport" aria-label="KBPrep 完整流程图画布">
      <div class="scale-shell" id="scaleShell">
        <div class="canvas" id="canvas">
          <svg class="edge-layer" id="edgeLayer" aria-hidden="true">
            <defs>
              <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
                <path d="M1,1 L8,5 L1,9 Z" fill="#b9bfc6"></path>
              </marker>
              <marker id="arrowPass" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
                <path d="M1,1 L8,5 L1,9 Z" fill="#2f6f5f"></path>
              </marker>
              <marker id="arrowFail" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
                <path d="M1,1 L8,5 L1,9 Z" fill="#9b3d35"></path>
              </marker>
            </defs>
          </svg>
          <div id="stageLayer"></div>
          <div id="labelLayer"></div>
          <div id="nodeLayer"></div>
        </div>
      </div>
      <aside class="help-card">
        <strong>怎么读这张图</strong>
        从上往下看主线；遇到菱形就是判断；红色线表示不过关回头修；虚线表示复跑或回到前面阶段。拖动画布可移动，搜索可定位节点。
      </aside>
    </main>
  </div>

      const pos = {};
      RANKS.forEach((rank, rankIndex) => {
        const y = top + rankIndex * gapY;
        const start = center - ((rank.length - 1) * gapX) / 2;
        rank.forEach((id, i) => {
          pos[id] = { x: Math.round(start + i * gapX), y };
        });
      });
      pos.I.x -= 490; pos.I.y += 20;
      pos.J.x += 300;
      ["I1", "I2", "I3", "I4", "I5"].forEach((id, i) => {
        pos[id].x = 800 + i * 210;
        pos[id].y += 18;
      });
      pos.Z2.x = 1230;
      pos.Z2.y += 10;
      pos.L.x -= 260;
      pos.M.x += 260;
      ["T", "T1", "T2", "T3", "T4", "T5", "T6", "U", "V", "W"].forEach((id) => {
        pos[id].x -= 560;
      });
      ["X", "X1", "X2", "X3", "X4", "X5", "Y", "Y1", "AA", "AB", "AB1", "AB2", "AB3", "AB4", "AB5", "AC"].forEach((id) => {
        pos[id].x += 420;
      });
      ["AD", "AD1", "AD2", "AD3", "AD4", "AD5", "AD6", "AE", "AF", "AG", "AH", "AI", "AJ", "AK", "AL"].forEach((id) => {
        pos[id].x += 520;
      });
      return pos;
    }

    function nodeClass(id, label) {
      const classes = ["node"];
      if (MAIN_NODES.has(id)) classes.push("main");
      if (DECISIONS.has(id)) classes.push("decision");
      if (TERMINALS.has(id)) classes.push("terminal");
      if (label.length > 18) classes.push("long");
      if (label.length > 26) classes.push("wide");
      return classes.join(" ");
    }

    function renderStages(pos) {
      STAGES.forEach(([label, rankIndex]) => {
        const el = document.createElement("div");
        el.className = "stage-label";
        el.textContent = label;
        el.style.left = "60px";
        el.style.top = `${52 + rankIndex * 108}px`;
        stageLayer.appendChild(el);
      });
    }

    function renderNodes() {
      const pos = buildPositions();
      Object.entries(NODE_LABELS).forEach(([id, label]) => {
        const p = pos[id];
        const el = document.createElement("div");
        el.className = nodeClass(id, label);
        el.id = `node-${id}`;
        el.dataset.id = id;
        el.dataset.label = label;
        el.textContent = label;
        el.style.left = `${p.x}px`;
        el.style.top = `${p.y}px`;
        nodeLayer.appendChild(el);
        nodes.set(id, { id, label, x: p.x, y: p.y, el });
      });
      renderStages(pos);
    }

    function box(id) {
      const node = nodes.get(id);
      return {
        x: node.x,
        y: node.y,
        w: node.el.offsetWidth,
        h: node.el.offsetHeight
      };
    }

    function anchor(id, side) {
      const b = box(id);
      if (side === "top") return { x: b.x + b.w / 2, y: b.y };
      if (side === "bottom") return { x: b.x + b.w / 2, y: b.y + b.h };
      if (side === "left") return { x: b.x, y: b.y + b.h / 2 };
      return { x: b.x + b.w, y: b.y + b.h / 2 };
    }

    function edgePath(from, to, kind) {
      const fb = box(from);
      const tb = box(to);
      const forward = tb.y > fb.y - 18;
      if (kind === "loop" || !forward) {
        const s = anchor(from, fb.x > tb.x ? "left" : "right");
        const t = anchor(to, fb.x > tb.x ? "left" : "right");
        const bend = fb.x > tb.x ? Math.min(s.x, t.x) - 210 : Math.max(s.x, t.x) + 210;
        return `M ${s.x} ${s.y} C ${bend} ${s.y}, ${bend} ${t.y}, ${t.x} ${t.y}`;
      }
      const s = anchor(from, "bottom");
      const t = anchor(to, "top");
      const dy = Math.max(34, (t.y - s.y) * .52);
      return `M ${s.x} ${s.y} C ${s.x} ${s.y + dy}, ${t.x} ${t.y - dy}, ${t.x} ${t.y}`;
    }

    function marker(kind) {
      if (kind === "pass") return "url(#arrowPass)";
      if (kind === "fail" || kind === "loop") return "url(#arrowFail)";
      return "url(#arrow)";
    }

    function renderEdges() {
      EDGES.forEach(([from, to, text, kind]) => {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", `edge ${kind || ""}`);
        path.setAttribute("d", edgePath(from, to, kind));
        path.setAttribute("marker-end", marker(kind));
        edgeLayer.appendChild(path);

        if (text) {
          const a = box(from);
          const b = box(to);
          const label = document.createElement("div");
          label.className = "edge-label";
          label.textContent = text;
          label.style.left = `${(a.x + b.x) / 2 + 82}px`;
          label.style.top = `${(a.y + b.y) / 2 + 6}px`;
          labelLayer.appendChild(label);
        }
      });
    }

    function setZoom(next, keepCenter = true) {
      const prev = zoom;
      zoom = Math.max(.12, Math.min(2.2, next));
      document.documentElement.style.setProperty("--zoom", zoom.toFixed(3));
      scaleShell.style.width = `${Math.ceil(canvas.offsetWidth * zoom)}px`;
      scaleShell.style.height = `${Math.ceil(canvas.offsetHeight * zoom)}px`;
      zoomReadout.textContent = `${Math.round(zoom * 100)}%`;
      if (keepCenter && prev !== zoom) {
        const ratio = zoom / prev;
        viewport.scrollLeft = (viewport.scrollLeft + viewport.clientWidth / 2) * ratio - viewport.clientWidth / 2;
        viewport.scrollTop = (viewport.scrollTop + viewport.clientHeight / 2) * ratio - viewport.clientHeight / 2;
      }
    }

    function fitAll() {
      const zx = (viewport.clientWidth - 36) / canvas.offsetWidth;
      const zy = (viewport.clientHeight - 36) / canvas.offsetHeight;
      setZoom(Math.min(zx, zy), false);
      viewport.scrollLeft = 0;
      viewport.scrollTop = 0;
    }

    function fitWidth() {
      setZoom((viewport.clientWidth - 40) / canvas.offsetWidth, false);
      viewport.scrollLeft = 0;
      viewport.scrollTop = 0;
    }

    function readMode() {
      setZoom(.9, false);
      viewport.scrollLeft = Math.max(0, (canvas.offsetWidth * zoom - viewport.clientWidth) / 2);
      viewport.scrollTop = 0;
    }

    function scrollToNode(id) {
      const n = nodes.get(id);
      if (!n) return;
      viewport.scrollTo({
        left: Math.max(0, (n.x + n.el.offsetWidth / 2) * zoom - viewport.clientWidth / 2),
        top: Math.max(0, (n.y + n.el.offsetHeight / 2) * zoom - viewport.clientHeight / 2),
        behavior: "smooth"
      });
    }

    function runSearch(delta = 0) {
      const query = searchBox.value.trim().toLowerCase();
      nodes.forEach((node) => node.el.classList.remove("highlight", "dimmed"));
      if (!query) {
        matches = [];
        matchIndex = 0;
        return;
      }
      matches = [...nodes.values()].filter((node) => node.id.toLowerCase().includes(query) || node.label.toLowerCase().includes(query));
      nodes.forEach((node) => {
        if (!matches.includes(node)) node.el.classList.add("dimmed");
      });
      matches.forEach((node) => node.el.classList.add("highlight"));
      if (matches.length) {
        matchIndex = (matchIndex + delta + matches.length) % matches.length;
        scrollToNode(matches[matchIndex].id);
      }
    }

    function enableDrag() {
      let active = false;
      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;
      viewport.addEventListener("pointerdown", (event) => {
        if (event.target.closest("button, input")) return;
        active = true;
        startX = event.clientX;
        startY = event.clientY;
        startLeft = viewport.scrollLeft;
        startTop = viewport.scrollTop;
        viewport.classList.add("dragging");
        viewport.setPointerCapture(event.pointerId);
      });
      viewport.addEventListener("pointermove", (event) => {
        if (!active) return;
        viewport.scrollLeft = startLeft - (event.clientX - startX);
        viewport.scrollTop = startTop - (event.clientY - startY);
      });
      viewport.addEventListener("pointerup", (event) => {
        active = false;
        viewport.classList.remove("dragging");
        viewport.releasePointerCapture(event.pointerId);
      });
    }

    renderNodes();
    renderEdges();
    enableDrag();
    document.getElementById("zoomIn").addEventListener("click", () => setZoom(zoom + .12));
    document.getElementById("zoomOut").addEventListener("click", () => setZoom(zoom - .12));
    document.getElementById("fitAll").addEventListener("click", fitAll);
    document.getElementById("fitWidth").addEventListener("click", fitWidth);
    document.getElementById("readMode").addEventListener("click", readMode);
    document.getElementById("fullScreen").addEventListener("click", () => {
      if (document.fullscreenElement) document.exitFullscreen?.();
      else document.documentElement.requestFullscreen?.();
    });
    document.getElementById("prevMatch").addEventListener("click", () => runSearch(-1));
    document.getElementById("nextMatch").addEventListener("click", () => runSearch(1));
    searchBox.addEventListener("input", () => {
      matchIndex = 0;
      runSearch(0);
    });
    window.addEventListener("resize", () => setZoom(zoom, false));
    setZoom(.48, false);
    viewport.scrollLeft = Math.max(0, (canvas.offsetWidth * zoom - viewport.clientWidth) / 2);
    viewport.scrollTop = 0;
  </script>
</body>
</html>
