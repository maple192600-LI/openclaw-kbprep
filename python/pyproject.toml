[project]
name = "kbprep-worker"
version = "0.5.1"
description = "KBPrep Python worker: prepare local raw files into clean Markdown"
requires-python = ">=3.10,<3.14"
dependencies = [
    "mineru[all]>=3.2.1,<4",
    "PyMuPDF>=1.27,<2",
    "beautifulsoup4==4.14.3",
    "lxml==6.0.2"
]

[project.optional-dependencies]
cuda = ["torch>=2.8,<3", "torchvision>=0.23,<1"]

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
