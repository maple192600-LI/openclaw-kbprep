[project]
name = "kbprep-worker"
version = "0.4.3"
description = "KBPrep Python worker: prepare local raw files into clean Markdown"
requires-python = ">=3.10,<3.14"
dependencies = [
    "mineru[all]==3.2.1",
    "PyMuPDF==1.27.2.3"
]

[project.optional-dependencies]
cuda = ["torch==2.8.0", "torchvision==0.23.0"]

[project.scripts]
# After `pip install -e .` the `kbprep` command is available globally.
# It is a thin shim around `python -m kbprep_worker.cli`.
kbprep = "kbprep_worker.cli:main"

[build-system]
requires = ["setuptools>=75.0"]
build-backend = "setuptools.build_meta"
